# Release 工作流：在打 v* tag 时自动构建多平台二进制、打包并发布 GitHub Release
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，可选）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  APP_NAME: feishu-cli

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - name: Compute version
        id: meta
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            version="$REF_NAME"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            version="v${INPUT_VERSION#v}"
          else
            version="snapshot-${GITHUB_SHA::7}"
          fi

          publish=false
          if [[ "$REF_TYPE" == "tag" && "$REF_NAME" == v* ]]; then
            publish=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$version publish=$publish"

  verify:
    name: Verify
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -count=1 ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            platform_name: linux-amd64
          - goos: linux
            goarch: arm64
            ext: ''
            platform_name: linux-arm64
          - goos: darwin
            goarch: amd64
            ext: ''
            platform_name: darwin-amd64
          - goos: darwin
            goarch: arm64
            ext: ''
            platform_name: darwin-arm64
          - goos: windows
            goarch: amd64
            ext: '.exe'
            platform_name: windows_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u '+%Y-%m-%d_%H:%M:%S')"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}"
          go build -trimpath -ldflags "${LDFLAGS}" -o "${APP_NAME}${{ matrix.ext }}" .

      - name: Smoke test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          OUTPUT="./${APP_NAME} --version"
          ./${APP_NAME} --version
          ./${APP_NAME} --version 2>&1 | grep -q "${VERSION}" || {
            echo "::error::版本号注入验证失败，期望包含 ${VERSION}"
            exit 1
          }

      - name: Package
        id: package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PLATFORM: ${{ matrix.platform_name }}
        run: |
          set -euo pipefail
          package_dir="${APP_NAME}_${VERSION}_${PLATFORM}"
          mkdir -p "dist/${package_dir}"

          # 二进制统一命名为 feishu-cli（Windows 为 feishu-cli.exe）
          cp "${APP_NAME}${{ matrix.ext }}" "dist/${package_dir}/${APP_NAME}${{ matrix.ext }}"
          if [[ "${{ matrix.goos }}" != "windows" ]]; then
            chmod +x "dist/${package_dir}/${APP_NAME}"
          fi

          # 打包为 tar.gz（install.sh 要求的格式）
          tar -C dist -czf "dist/${package_dir}.tar.gz" "${package_dir}"
          echo "asset=dist/${package_dir}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "asset_name=${package_dir}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 30

  bundle:
    name: Bundle
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz | sort > checksums.txt
          cat checksums.txt

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release/*
          retention-days: 30

  publish:
    name: Publish GitHub Release
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true
